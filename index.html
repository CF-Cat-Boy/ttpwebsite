<!DOCTYPE html>
<head>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/minstyle.io.css">
</head>
<body>
    <nav>
        <div class="theme-switch-wrapper">
            <label class="theme-switch" for="checkbox">
                <input type="checkbox" id="checkbox" />
                <div class="slider round"></div>
        </label>
        <strong>Dark Mode</strong>
        </div>
    </nav>
    <main>
        <body>
            <!-- Image Map Generated by http://www.image-map.net/ -->
            <img src="/images/maps/h5cxu8ec1nwe1.png" usemap="#image-map">

            <map name="image-map">
                <area target="_self" alt="Sinnoh" title="Sinnoh" href="sinnoh/" coords="4564,1240,97" shape="circle">
                <area target="_self" alt="Kalos" title="Kalos" href="kalos/" coords="3189,1602,131" shape="circle">
            </map>
        </body>
    </main>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/image-map-resizer/1.0.10/js/imageMapResizer.min.js">imageMapResize();</script>
    <script id="rendered-js" wfd-invisible="true">

        const toggleSwitch = document.querySelector('.theme-switch input[type="checkbox"]');
        const currentTheme = localStorage.getItem('theme');

        if (currentTheme) {
        document.documentElement.setAttribute('data-theme', currentTheme);

        if (currentTheme === 'dark') {
            toggleSwitch.checked = true;
        }
        }

        function switchTheme(e) {
        if (e.target.checked) {
            document.documentElement.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', 'dark');
        } else
        {document.documentElement.setAttribute('data-theme', 'light');
            localStorage.setItem('theme', 'light');
        }
        }

        toggleSwitch.addEventListener('change', switchTheme, false);
        //# sourceURL=pen.js
  </script>
</body>
