    <script id="rendered-js" wfd-invisible="true">
        /*
        */

        const toggleSwitch = document.querySelector('.theme-switch input[type="checkbox"]');
        const currentTheme = localStorage.getItem('theme');

        if (currentTheme) {
        document.documentElement.setAttribute('data-theme', currentTheme);

        if (currentTheme === 'dark') {
            toggleSwitch.checked = true;
        }
        }

        function switchTheme(e) {
        if (e.target.checked) {
            document.documentElement.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', 'dark');
        } else
        {document.documentElement.setAttribute('data-theme', 'light');
            localStorage.setItem('theme', 'light');
        }
        }

        toggleSwitch.addEventListener('change', switchTheme, false);
        //# sourceURL=pen.js



        const overlay = document.getElementById('overlay');
        const openBtn = document.getElementById('openBtn');
        const rotom = document.getElementById('rotom');
        const dex = document.getElementById('floette-dex');
        const rotex = document.getElementById('rotom-dex');
        const rotsound = document.getElementById('rotsound');
        const dex1 = document.getElementById('dex1');
        const dex2 = document.getElementById('dex2');

        dex.volume = 0.5
        rotex.volume = 0.25
        
        // Show the overlay
        openBtn.addEventListener('click', () => {
            overlay.classList.remove('hidden');
            rotom.classList.add('hidden');
            rotsound.play();
            dex.play();
        });

        // Hide if user clicks the dark space
        overlay.addEventListener('click', (e) => {
        if (e.target === overlay) {
            overlay.classList.add('hidden');
            rotom.classList.remove('hidden');
            dex.pause();
            dex.currentTime = 0;
            rotex.pause();
            rotex.currentTime = 0;
            dex2.classList.add("hidden");
            dex1.classList.remove("hidden");
        }
        });

        dex.addEventListener('ended', (event) => {
            dex1.classList.add("hidden");
            dex2.classList.remove("hidden");
            rotex.play();
        });
  </script>
